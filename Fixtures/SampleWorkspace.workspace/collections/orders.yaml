id: col_orders
name: Orders
requests:
- id: req_orders_list
  name: List orders
  kind: rest
  method: GET
  url: "{{baseUrl}}/orders"
  headers:
    Accept: application/json
  params:
    limit: "50"
  auth:
    type: bearer
    tokenVariable: apiToken
  body:
    type: none
- id: req_orders_graphql
  name: GraphQL orders
  kind: graphql
  method: POST
  url: "{{baseUrl}}/graphql"
  headers: {}
  params: {}
  body:
    type: none
  graphQL:
    query: |-
      query Orders($limit: Int!) {
        orders(limit: $limit) {
          id
          status
        }
      }
    operationName: Orders
    variables: |-
      {"limit": 50}
